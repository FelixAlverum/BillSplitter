name: Docker Image Build und Push

on:
  push:
    branches: [ "main" ] # Der Build startet, sobald du Code in den 'main' Branch pushst
  workflow_dispatch: # Ermöglicht den manuellen Start per Knopfdruck

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Ermöglicht das Schreiben in die GitHub Container Registry

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadaten extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Docker Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}